<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

  <div class="login">
    <div class="container">
      
      <!-- Logo Senangkos -->
      <div class="logo-wrapper">
        <img src="../images/lg.svg" alt="Logo Senangkos" />
      </div>
  
      <!-- Form Login -->
      <div class="popup-login">
        <div class="login-sekarang-juga">Login Sekarang Juga!</div>
  
        <div class="form-group">
          <input type="text" id="username" class="input-field" placeholder="Username" />
        </div>
  
        <div class="form-group">
          <input type="password" id="password" class="input-field" placeholder="Password" />
        </div>
  
        <p class="signup-link">Belum memiliki akun? <a href="register.html"><strong>Daftar di sini</strong></a></p>
  
        <div class="login-btn" id="login-btn">Login</div>
  
        <p id="error-message" class="hidden" style="text-align:center; color:red; margin-top:10px;"></p>
      </div>
  
    </div>
  </div>
  
  <script src="../js/login.js"></script>

  <script src="../js/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/jquery-validation-1.19.5/jquery.validate.min.js"></script>
  <script src="../js/jquery-validation-1.19.5/additional-methods.min.js"></script>

  <script>
    $(document).ready(function () {
  $("#login-btn").click(function (e) {
    e.preventDefault();

    const username = $("#username").val();
    const password = $("#password").val();

    $("#error-message").addClass('hidden').text('');

    if (!username || !password) {
      $("#error-message").removeClass('hidden').text('Username dan Password wajib diisi.');
      return;
    }

    $.ajax({
      url: "http://localhost:8000/api/login",
      method: "POST",
      data: {
        username: username,
        password: password
      },
      success: function (response) {
        // Simpan token
        localStorage.setItem("token", response.token);

        // Cek role dan verifikasi email
        if (response.role === "pemilik") {
          // Pemilik bisa langsung masuk
          window.location.href = "../../frontend-admin/adminview/indexadmin.html";
        } else if (response.role === "penyewa") {
          // Penyewa harus verifikasi email dulu
          if (!response.email_verified_at) {
            $("#error-message").removeClass('hidden').text("Email harus diverifikasi terlebih dahulu. Silakan cek email Anda.");
            return;
          }
          window.location.href = "homepage.html";
        } else {
          // Role tidak dikenali → tampilkan seolah belum verifikasi
          $("#error-message").removeClass('hidden').text("Email harus diverifikasi terlebih dahulu. Silakan cek email Anda.");
        }
      },
      error: function (xhr) {
        let errorMsg = "Login gagal. Coba lagi.";
        if (xhr.responseJSON) {
          const res = xhr.responseJSON;
          if (res.errors?.email) {
            errorMsg = res.errors.email[0];
          } else if (res.errors?.username) {
            errorMsg = res.errors.username[0];
          } else if (res.message) {
            errorMsg = res.message;
          }
        }

        $("#error-message").removeClass('hidden').text(errorMsg);
      }
    });
  });
});

  </script>
  

</body>
</html>
