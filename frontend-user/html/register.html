<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Senangkos</title>
  <link rel="stylesheet" href="../css/register.css" />
  <!-- Include jQuery only once -->
  <script src="../js/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/jquery-validation-1.19.5/jquery.validate.min.js"></script>
  <script src="../js/jquery-validation-1.19.5/additional-methods.min.js"></script>
</head>
<body>
  <!-- Your HTML content remains the same -->
  <div class="logo-top">
    <img src="../images/lg.svg" alt="Logo Senangkos" class="logo-img" />
  </div>

  <div class="sign-up">
    <div class="form-container">
      <div class="form-box">
        <h2 class="form-title">Daftar Sekarang Juga!</h2>
        <input type="text" id="username" placeholder="Username" class="input" required />
        <input type="text" id="nama" placeholder="Nama" class="input" required />
        <input type="text" id="hp" placeholder="No. Telpon" class="input" required />
        <input type="email" id="email" placeholder="Email" class="input" required />
        <input type="password" id="password" placeholder="Password" class="input" required />
        <input type="password" id="password_confirmation" placeholder="Konfirmasi Password" class="input" required />
        <button id="btnRegister" class="register-button">Daftar</button>
        <p class="login-text">Sudah memiliki akun? <a href="login.html">Login di sini</a></p>
      </div>
    </div>
  </div>

  <script>
    $(document).ready(function () {
      $('#btnRegister').on('click', function (e) {
        e.preventDefault();
  
        // Ambil data form
        const formData = {
          name: $('#nama').val(),
          username: $('#username').val(),
          no_telp: $('#hp').val(),
          email: $('#email').val(),
          password: $('#password').val(),
          password_confirmation: $('#password_confirmation').val(), // penting untuk validasi konfirmasi
          role: 'penyewa'
        };
  
        // Validasi sederhana sebelum kirim (opsional, biar lebih UX friendly)
        if (!formData.name || !formData.username || !formData.no_telp || !formData.email || !formData.password || !formData.password_confirmation) {
          Swal.fire({
            icon: 'warning',
            title: 'Semua kolom wajib diisi!',
            text: 'Mohon lengkapi semua field.'
          });
          return;
        }
  
        // Kirim ke server
        $.ajax({
          url: 'http://localhost:8000/api/register',
          method: 'POST',
          data: formData,
          dataType: 'json',
          success: function (response) {
            Swal.fire({
              icon: 'success',
              title: 'Pendaftaran Berhasil!',
              html: 'Silakan cek email Anda untuk <b>verifikasi akun</b> sebelum login.',
            }).then(() => {
              window.location.href = 'login.html';
            });
          },
          error: function (xhr) {
            let message = 'Terjadi kesalahan saat mendaftar.';
  
            if (xhr.responseJSON) {
              if (xhr.responseJSON.message) {
                message = xhr.responseJSON.message;
              }
  
              if (xhr.responseJSON.errors) {
                message = '';
                $.each(xhr.responseJSON.errors, function (key, value) {
                  message += value[0] + '<br>';
                });
              }
            }
  
            Swal.fire({
              icon: 'error',
              title: 'Gagal Mendaftar',
              html: message,
            });
          }
        });
      });
    });
  </script>
  
   
  

</body>
</html>
