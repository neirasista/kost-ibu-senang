<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Transaksi | SenangKos</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-xh6JNQcHqund0MZXYXW2gV7KnL6XLZ7OeT+KhpafSkpeb7lcyL2V+F7fG1Evk9WDEvNLf2Hx7oM5t3RxwZ5qYQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/adminstyle.css" />
</head>
<body>
  <div class="sidebar">
    <div class="logo-container">
      <img src="../images/logosenangkos.svg" alt="Logo" class="logo">
    </div>
    <ul class="sidebar-menu">
      <li>
        <a href="indexadmin.html" class="sidebar-link">
          <img src="../images/icon-home.svg" class="icon">
          <span class="sidebar-text">Dashboard</span>
        </a>
      </li>
      <li>
        <a href="manajemenkamar.html" class="sidebar-link">
          <img src="../images/icon-mkamar.svg" class="icon">
          <span class="sidebar-text">Manajemen Kamar</span>
        </a>
      </li>
      <li>
        <a href="manajemenkeuangan.html" class="sidebar-link">
          <img src="../images/icon-mkeuangan.svg" class="icon">
          <span class="sidebar-text">Manajemen Keuangan</span>
        </a>
      </li>
    </ul>
  </div>

  <div class="content-wrapper">
    <header>
      <div class="header-buttons-row">
        <div class="header-buttons">
          <button class="btn-green" onclick="window.location.href='../../frontend-user/html/homepage.html'">Lihat Web</button>
          <button class="btn-red" id="logoutBtn">Logout</button>
        </div>
      </div>
      <div class="greeting">
        <h2>Manajemen Kamar</h2>
        <p>Tambah Kamar Baru</p>
      </div>
    </header>

    <div class="main-content">
      <section class="form-kamar">
        <h3>Tambah Kamar Baru</h3>
        <form class="form-container" id="formTambahKamar" enctype="multipart/form-data">
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="status" required>
              <option value="">Pilih Status</option>
              <option value="Kosong">Kosong</option>
              <option value="Terisi">Terisi</option>
            </select>
          </div>

          <div class="form-group">
            <label for="harga">Harga per Bulan (Rp)</label>
            <input type="number" id="harga" name="harga" placeholder="Contoh: 850000" required />
          </div>

          <div class="form-group">
            <label for="fasilitas">Fasilitas</label>
            <input type="text" id="fasilitas" name="fasilitas" placeholder="Contoh: Kamar mandi dalam, AC, WiFi" required />
          </div>

          <div class="form-group">
            <label for="image">Upload Foto Kamar</label>
            <input type="file" id="image" name="image" accept="image/*" required />
          </div>

          <div class="form-group">
            <label for="luas">Luas Kamar</label>
            <input type="text" id="luas" name="luas" placeholder="Contoh: 50x10" required />
          </div>

          <div class="form-buttons">
            <button type="submit" class="btn-blue">Simpan</button>
            <button type="reset" class="btn-red">Reset</button>
          </div>
        </form>
      </section>
    </div>
  </div>

  <!-- Sidebar active link -->
  <script>
    const currentPage = window.location.pathname.split("/").pop();
    document.querySelectorAll(".sidebar-link").forEach(link => {
      if (link.getAttribute("href") === currentPage) {
        link.classList.add("active");
      }
    });
  </script>

  <!-- SweetAlert dan jQuery -->
  <script src="../js/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/jquery-validation-1.19.5/jquery.validate.min.js"></script>
  <script src="../js/jquery-validation-1.19.5/additional-methods.min.js"></script>

  <!-- AJAX + Token Check -->
  <script>

$(document).ready(function () {
      $('#logoutBtn').click(function () {
        Swal.fire({
          title: 'Konfirmasi',
          text: "Anda yakin ingin logout?",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#3085d6',
          cancelButtonColor: '#d33',
          confirmButtonText: 'Ya, logout!'
        }).then((result) => {
          if (result.isConfirmed) {
            localStorage.removeItem("token"); // Hapus token login
            Swal.fire({
              title: 'Berhasil!',
              text: 'Anda telah logout.',
              icon: 'success',
              timer: 1500,
              showConfirmButton: false
            }).then(() => {
              window.location.href = '../../frontend-user/html/login.html'; // Arahkan ke halaman login
            });
          }
        });
      });
    });

 $('#formTambahKamar').submit(function (e) {
  e.preventDefault();

  if (!$(this).valid()) return; // validasi jQuery

  const token = localStorage.getItem("token");
  if (!token) {
    Swal.fire({
      icon: 'error',
      title: 'Gagal!',
      text: 'Anda harus login terlebih dahulu.',
    });
    return;
  }

  const formData = new FormData(this);

  $.ajax({
    url: 'http://localhost:8000/api/kamars',
    type: 'POST',
    data: formData,
    processData: false,
    contentType: false,
    headers: {
      Authorization: `Bearer ${token}`
    },
    success: function (response) {
      Swal.fire({
        title: 'Sukses!',
        text: response.message || 'Data kamar berhasil ditambahkan.',
        icon: 'success',
        confirmButtonText: 'OK'
      }).then(() => {
        window.location.href = 'manajemenkamar.html';
      });
    },
    error: function (xhr) {
      let msg = 'Terjadi kesalahan.';
      if (xhr.status === 422) {
        const errors = xhr.responseJSON.errors;
        msg = Object.values(errors).map(err => err[0]).join('\n');
      } else if (xhr.responseJSON && xhr.responseJSON.message) {
        msg = xhr.responseJSON.message;
      }

      Swal.fire({
        title: 'Gagal!',
        text: msg,
        icon: 'error',
        confirmButtonText: 'OK'
      });
    }
  });
});


  </script>
</body>
</html>
